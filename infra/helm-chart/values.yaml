appId: ""

image:
  repository: ghcr.io/your-org/placeholder
  tag: latest
  pullPolicy: Always

replicas: 1

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 250m
    memory: 256Mi

env: {}

ingress:
  subdomain: ""
  className: nginx

postgres:
  enabled: false
  instances: 1
  storage: 5Gi

migrations:
  enabled: false
  command: ["npm", "run", "migrate"]
