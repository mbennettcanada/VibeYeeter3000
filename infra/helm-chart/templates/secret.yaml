# Syncs app secrets from AWS Secrets Manager into a local k8s Secret named
# `app-secrets`, consumed via envFrom in deployment.yaml. Requires the
# External Secrets Operator (installed cluster-wide, see
# infra/cluster/operators.tf) and a ClusterSecretStore pointed at Secrets
# Manager (provisioned once, out of band, not per-app).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  labels:
    app.kubernetes.io/managed-by: vibeyeeter
    app.kubernetes.io/instance: {{ .Values.appId | quote }}
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        path: {{ printf "vibeyeeter/%s/" .Values.appId }}
