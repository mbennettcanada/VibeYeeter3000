  namespace: vibeyeeter-system
spec:
  template:
    spec:
      containers:
        - name: web
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
