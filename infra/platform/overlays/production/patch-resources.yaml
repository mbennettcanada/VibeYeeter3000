apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vibeyeeter-system
spec:
  template:
    spec:
      containers:
        - name: api
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
