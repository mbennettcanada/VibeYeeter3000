apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: vibeyeeter-system
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: vibeyeeter-system
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: tf-runner
  namespace: vibeyeeter-system
spec:
  type: ClusterIP
  selector:
    app: tf-runner
  ports:
    - port: 4001
      targetPort: 4001
