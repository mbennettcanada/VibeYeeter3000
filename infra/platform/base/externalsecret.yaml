# Syncs platform-own credentials from AWS Secrets Manager into a single k8s
# Secret consumed via envFrom by the api and tf-runner Deployments. Requires
# the External Secrets Operator and the "aws-secrets-manager"
# ClusterSecretStore (both provisioned in infra/cluster, see
# infra/cluster/operators.tf) — same secret store used by per-app
# ExternalSecrets in infra/helm-chart.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vibeyeeter-platform-secrets
  namespace: vibeyeeter-system
# Expects one AWS secret per key under the vibeyeeter/platform/ prefix,
# e.g. vibeyeeter/platform/DATABASE_URL, vibeyeeter/platform/SESSION_SECRET,
# vibeyeeter/platform/GITHUB_APP_ID, vibeyeeter/platform/GITHUB_APP_PRIVATE_KEY,
# vibeyeeter/platform/GITHUB_APP_INSTALLATION_ID, vibeyeeter/platform/GITHUB_WEBHOOK_SECRET,
# vibeyeeter/platform/SAML_ENTITY_ID, vibeyeeter/platform/SAML_IDP_SSO_URL,
# vibeyeeter/platform/SAML_IDP_CERT, vibeyeeter/platform/TF_RUNNER_DATABASE_URL.
# The resulting k8s Secret key is the AWS secret name's final path segment,
# matching the env var name consumed by the Deployments below.
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: vibeyeeter-platform-secrets
    creationPolicy: Owner
  dataFrom:
    - find:
        path: vibeyeeter/platform/
