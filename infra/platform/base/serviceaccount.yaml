# ServiceAccount names must match infra/cluster/irsa.tf's
# `namespace_service_accounts` bindings exactly ("vibeyeeter-system:platform-api"
# and "vibeyeeter-system:tf-runner") for IRSA to work. The role ARN
# annotations are placeholders substituted by scripts/deploy-platform.sh
# (envsubst) from the PLATFORM_API_IRSA_ROLE_ARN / TF_RUNNER_IRSA_ROLE_ARN
# env vars (see the irsa.tf module outputs) — do not hardcode real ARNs here.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-api
  namespace: vibeyeeter-system
  annotations:
    eks.amazonaws.com/role-arn: "${PLATFORM_API_IRSA_ROLE_ARN}"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tf-runner
  namespace: vibeyeeter-system
  annotations:
    eks.amazonaws.com/role-arn: "${TF_RUNNER_IRSA_ROLE_ARN}"
---
# apps/web makes no direct AWS or Kubernetes API calls, so it gets a plain
# ServiceAccount with no IRSA binding.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: vibeyeeter-system
