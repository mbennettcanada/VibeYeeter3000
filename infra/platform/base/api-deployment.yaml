apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: vibeyeeter-system
  labels:
    app: api
    app.kubernetes.io/part-of: vibeyeeter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        app.kubernetes.io/part-of: vibeyeeter
    spec:
      serviceAccountName: platform-api
      containers:
        - name: api
          image: ghcr.io/your-org/vibeyeeter-api:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: vibeyeeter-platform-config
            - secretRef:
                name: vibeyeeter-platform-secrets
          env:
            - name: PORT
              value: "3002"
          resources:
            requests:
              cpu: "250m"
              memory: 256Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
