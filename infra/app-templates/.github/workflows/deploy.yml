name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/{{ORG}}/${{ github.event.repository.name }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Trigger platform deployment
        env:
          VIBEYEETER_API_TOKEN: ${{ secrets.VIBEYEETER_API_TOKEN }}
        run: |
          curl --fail-with-body -sS -X POST \
            "https://vibeyeeter.internal.co/apps/{{APP_ID}}/deployments" \
            -H "Authorization: Bearer ${VIBEYEETER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"imageTag\": \"${{ env.IMAGE }}:${{ github.sha }}\"}"
