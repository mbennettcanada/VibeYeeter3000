# Per-app override for infra/helm-chart/values.yaml. Regenerated by the
# platform (packages/github-app pushAppTemplates) whenever app config
# changes; hand edits will be overwritten on the next push.
appId: "{{APP_ID}}"

image:
  repository: ghcr.io/{{ORG}}/{{SUBDOMAIN}}
  tag: latest

ingress:
  subdomain: "{{SUBDOMAIN}}"

postgres:
  enabled: false

migrations:
  enabled: false
